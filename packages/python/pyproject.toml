[project]
name = "aillium-schemas"
version = "0.1.0"
description = "Canonical schemas and API contracts for Aillium services."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
  "pydantic>=2.8.0",
]

[project.urls]
Homepage = "https://aillium.io"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["aillium_schemas*"]

[tool.setuptools.package-data]
"aillium_schemas" = ["**/*.json"]

[tool.setuptools]
include-package-data = true